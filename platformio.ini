[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

board_build.f_cpu = 160000000L
board_build.flash_mode = dio
board_build.ldscript = eagle.flash.4m2m.ld

monitor_speed = 115200
upload_speed = 921600

lib_deps = 
    bodmer/TFT_eSPI@^2.5.0
    bitbank2/PNGdec@^1.0.1        # PNG
    # bodmer/TJpg_Decoder@^1.0.8  # JPG

build_flags = 
    -D BEARSSL_SSL_BASIC
    -D NDEBUG